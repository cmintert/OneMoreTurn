site_name: OneMoreTurn — Dev Docs
site_description: API reference for the OneMoreTurn PBEM 4X game engine
repo_url: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            show_if_no_docstring: false
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2

watch:
  - src

nav:
  - Home: index.md
  - Engine: engine/index.md
  - Game: game/index.md
  - Persistence: persistence/index.md
  - CLI: cli/index.md
